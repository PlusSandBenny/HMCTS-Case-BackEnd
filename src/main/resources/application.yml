spring:
  application:
    name: hmcts-task-management-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/hmctsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: hmctsuser
    password: hmctspassword
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect  # Changed from MySQLDialect to MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
    open-in-view: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG  # Log SQL statements
        type:
          descriptor:
            sql:
              BasicBinder: TRACE  # Log parameter bindings
      springframework:
        web: INFO
    mhct:
      task:
        manager: DEBUG  # Added package-level logging for your app

      
